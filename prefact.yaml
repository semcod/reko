project_root: .
package_name: reko
include:
- '**/*.py'
exclude:
- '**/__pycache__/**'
- '**/node_modules/**'
- '**/.venv/**'
- '**/.venv*/**'
- '**/venv/**'
- '**/venv*/**'
- '**/env/**'
- '**/.git/**'
- '**/build/**'
- '**/dist/**'
- '**/*.egg-info/**'
- '**/examples/**'
- '**/tests/fixtures/**'
tools:
  parallel: true
  cache: true
  ruff:
    enabled: true
    max_line_length: 100
    select:
    - E
    - F
    - W
    - I
    ignore:
    - E501
  mypy:
    enabled: true
    strict: false
    ignore_missing_imports: true
  isort:
    enabled: true
    profile: black
    multi_line_output: 3
performance:
  max_workers: 4
rules:
  unused-imports:
    enabled: true
    tools:
    - ruff
    - autoflake
    severity: error
  magic-numbers:
    enabled: false
  string-concat:
    enabled: false
  missing-return-type:
    enabled: true
    tools:
    - mypy
    severity: warning
  ai-boilerplate:
    enabled: false
  llm-hallucinations:
    enabled: false
